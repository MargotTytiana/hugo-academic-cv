bio: |
  🚧🛠️  The Website Is Under Construction.  🛠️🚧

  I am a Master's student in Signal Processing and Machine Learning at Tampere University. 
  Building on my undergraduate foundation in Software Engineering, my research focuses on the intersection of nonlinear dynamics and 
  deep neural networks. Under the supervision of Prof. Annamaria Mesaros, my current thesis work develops *ChaoNet* — a novel framework 
  for speaker recognition that leverages chaos theory for robust audio representations. I enjoy working in dynamic, cross-cultural 
  research environments, navigating technical challenges and explore the boundry of science.

